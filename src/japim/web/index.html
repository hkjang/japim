<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JAPIM Test Page</title>
  <style>
    :root {
      --bg: #f5f2eb;
      --panel: #fffdf8;
      --ink: #1d1b18;
      --accent: #0b6e4f;
      --accent-2: #bd632f;
      --line: #d8d0c2;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Malgun Gothic", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(189,99,47,0.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(11,110,79,0.14), transparent 32%),
        var(--bg);
      color: var(--ink);
    }
    .wrap {
      max-width: 920px;
      margin: 0 auto;
      padding: 48px 20px 72px;
    }
    .hero {
      background: linear-gradient(135deg, rgba(255,253,248,0.95), rgba(248,242,232,0.88));
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 28px;
      box-shadow: 0 18px 60px rgba(38, 28, 15, 0.08);
    }
    h1 { margin: 0 0 10px; font-size: 34px; }
    p { line-height: 1.6; }
    .panel {
      margin-top: 24px;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 12px 32px rgba(38, 28, 15, 0.06);
    }
    input[type="file"] {
      width: 100%;
      padding: 16px;
      border: 1px dashed var(--line);
      border-radius: 18px;
      background: #fff;
    }
    button {
      margin-top: 16px;
      border: 0;
      border-radius: 999px;
      padding: 14px 20px;
      color: #fff;
      background: linear-gradient(120deg, var(--accent), #158061);
      font-weight: 700;
      cursor: pointer;
    }
    button:disabled { opacity: 0.45; cursor: wait; }
    .status {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      background: #f0ece4;
      white-space: pre-wrap;
    }
    .links a {
      display: inline-block;
      margin: 10px 12px 0 0;
      color: var(--accent-2);
      font-weight: 700;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>JAPIM 테스트 페이지</h1>
      <p>PDF 파일을 업로드하면 REST API를 통해 마스킹 작업을 생성하고, 상태를 주기적으로 조회한 뒤 결과 PDF와 감사 로그를 내려받을 수 있습니다.</p>
    </section>

    <section class="panel">
      <label for="pdfFile">PDF 업로드</label>
      <input id="pdfFile" type="file" accept="application/pdf">
      <button id="submitBtn">업로드 후 처리 시작</button>
      <div id="statusBox" class="status">대기 중</div>
      <div id="links" class="links"></div>
    </section>
  </div>

  <script>
    const fileInput = document.getElementById("pdfFile");
    const submitBtn = document.getElementById("submitBtn");
    const statusBox = document.getElementById("statusBox");
    const links = document.getElementById("links");

    const setStatus = (text) => { statusBox.textContent = text; };
    const clearLinks = () => { links.innerHTML = ""; };
    const addLink = (label, href) => {
      const anchor = document.createElement("a");
      anchor.href = href;
      anchor.textContent = label;
      anchor.target = "_blank";
      links.appendChild(anchor);
    };

    async function poll(jobId) {
      while (true) {
        const response = await fetch(`/api/v1/jobs/${jobId}`);
        const data = await response.json();
        setStatus(JSON.stringify(data, null, 2));

        if (data.status === "success") {
          clearLinks();
          if (data.masked_pdf_url) addLink("마스킹 PDF 다운로드", data.masked_pdf_url);
          if (data.detections_csv_url) addLink("CSV 로그 다운로드", data.detections_csv_url);
          if (data.detections_jsonl_url) addLink("JSONL 로그 다운로드", data.detections_jsonl_url);
          submitBtn.disabled = false;
          return;
        }

        if (data.status === "fail") {
          submitBtn.disabled = false;
          return;
        }

        await new Promise((resolve) => setTimeout(resolve, 2000));
      }
    }

    submitBtn.addEventListener("click", async () => {
      const file = fileInput.files[0];
      if (!file) {
        setStatus("PDF 파일을 먼저 선택하세요.");
        return;
      }

      submitBtn.disabled = true;
      clearLinks();
      setStatus("업로드 중...");

      const formData = new FormData();
      formData.append("file", file);

      const response = await fetch("/api/v1/jobs", {
        method: "POST",
        body: formData
      });

      const data = await response.json();
      setStatus(JSON.stringify(data, null, 2));
      await poll(data.job_id);
    });
  </script>
</body>
</html>
