job_name_prefix: "japim-gpu-smoke"
input_dir: "/workspace/input"
output_dir: "/workspace/output"
temp_dir: "/workspace/temp"

dpi: 300
ocr_backend: "paddle"
ocr_lang: "korean"
use_angle_cls: true
confidence_threshold: 0.45
auxiliary_confidence_threshold: 0.25

enable_grayscale: true
enable_binarize: false
enable_denoise: true
enable_deskew: true
min_short_edge: 1800
line_merge_tolerance_px: 24.0
token_gap_multiplier: 0.65

mask_padding: 6
mask_style: "box"
mask_color: [0, 0, 0]
blur_radius: 10
pixelate_block_size: 12

stop_on_error: false
save_debug_image: true
save_ocr_json: true
save_preprocessed_image: false

enabled_rules:
  - RULE-05
  - RULE-10

paddle:
  use_gpu: true
  device: "gpu"
  det_model_dir: "models/paddleocr/det"
  rec_model_dir: "models/paddleocr/rec"
  cls_model_dir: "models/paddleocr/cls"
  show_log: false

audit:
  write_csv: true
  write_jsonl: true
  write_summary: true
